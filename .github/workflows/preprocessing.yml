name: Automate Data Preprocessing

# This triggers the action whenever you push code to the main branch
on:
  push:
    branches:
      - main
  workflow_dispatch: # This allows you to click a button to run it manually on GitHub

jobs:
  preprocess-data:
    runs-on: ubuntu-latest

    steps:
      # 1. Pulls your repository code onto the GitHub server
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Sets up the Python environment
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Installs the exact libraries your script needs
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      # 4. Executes your automation script
      - name: Run Preprocessing Script
        run: |
          python preprocessing/automate_Steven-Yap.py

      # 5. Saves the output and pushes it back to your repository
      - name: Commit and Push Processed Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/mall_customers_preprocessing/cleaned_data.csv
          
          # This line checks if the data actually changed before trying to commit, preventing errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update processed dataset" && git push)